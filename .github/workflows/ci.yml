name: YMessage CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # 1. Backend Verification & Tests
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('backend/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: cd backend && go mod download

      - name: Build server executable
        run: cd backend && go build -v ./cmd/server

      - name: Run Backend Tests
        run: cd backend && go test -v ./...

  # 2. Frontend Linter & Build Check
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Verify linter rules
        run: cd frontend && npm run lint || true # Warnings shouldn't block deployment

      - name: Compile and build production bundle
        run: cd frontend && npm run build

  # 3. Docker Compilation Verification
  docker-compile:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Backend Docker Build
        run: docker build -t ymessage-backend:test ./backend

      - name: Verify Frontend Docker Build
        run: docker build -t ymessage-frontend:test ./frontend
