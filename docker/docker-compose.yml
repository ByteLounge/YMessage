version: '3.8'

services:
  # 1. PostgreSQL Relational Database
  ymessage-postgres:
    image: postgres:15-alpine
    container_name: ymessage-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: ymessage
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Redis Pub/Sub Session Caching
  ymessage-redis:
    image: redis:7-alpine
    container_name: ymessage-redis
    restart: always
    ports:
      - "6379:6379"

  # 3. Go API Gateway & Messaging Backend
  ymessage-backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ymessage-backend
    restart: always
    depends_on:
      - ymessage-postgres
      - ymessage-redis
    environment:
      - DATABASE_URL=postgres://postgres:postgrespassword@ymessage-postgres:5432/ymessage?sslmode=disable
      - REDIS_URL=ymessage-redis:6379
      - JWT_SECRET=ymessage_super_secure_production_secret_key
      - S3_BUCKET=ymessage-media
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_ENDPOINT=http://ymessage-minio:9000
      - PORT=8080
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/root/uploads

  # 4. Next.js Web Client & Admin Dashboard
  ymessage-frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ymessage-frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost
    ports:
      - "3000:3000"
    depends_on:
      - ymessage-backend

  # 5. Nginx Load Balancer / Reverse Proxy
  ymessage-nginx:
    image: nginx:alpine
    container_name: ymessage-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./Nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ymessage-frontend
      - ymessage-backend

volumes:
  postgres_data:
  uploads_data:
